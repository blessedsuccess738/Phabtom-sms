kind = "web"
previewPath = "/"
title = "Phantom Business SMS Gateway"
version = "1.0.0"
id = "artifacts/phantom-sms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19840

[services.development]
run = "pnpm --filter @workspace/phantom-sms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phantom-sms", "run", "build" ]
publicDir = "artifacts/phantom-sms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19840"
BASE_PATH = "/"
